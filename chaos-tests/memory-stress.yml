# chaos-tests/memory-stress.yaml
apiVersion: v1
kind: Pod
metadata:
  name: memory-stress
spec:
  containers:
  - name: memory-stress
    image: polinux/stress
    args: ["--vm", "1", "--vm-bytes", "512M", "--timeout", "60s"]
    resources:
      requests:
        memory: "256Mi"
      limits:
        memory: "600Mi"
  restartPolicy: Never